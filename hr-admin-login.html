<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Admin Login | Royal Orchid HR Portal</title>
    <link rel="stylesheet" href="hr-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="hero" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="container" style="width: 100%; max-width: 500px;">
            <div class="card glass" style="padding: 2rem;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <img src="logo.jpg" alt="Royal Orchid Logo" style="height: 60px; margin-bottom: 1rem;">
                    <h2 style="color: var(--text);">HR Admin Login 🔐</h2>
                    <p style="color: var(--muted); font-size: 0.9rem;">Sign in to manage recruitment requests</p>
                </div>
                
                <form id="adminLoginForm">
                    <div class="form-group mb-large">
                        <label for="adminEmail">Email Address</label>
                        <input type="email" id="adminEmail" placeholder="it@royalorchidhotels.com" required>
                    </div>
                    <div class="form-group mb-large">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" placeholder="Enter your password" required>
                    </div>
                    
                    <div style="text-align: center; margin: 1rem 0;">
                        <button type="button" class="btn btn-secondary" id="sendOtpBtn" style="width: auto; padding: 10px 20px;">
                            Send OTP to Email
                        </button>
                    </div>

                    <div id="otpSection" class="hidden" style="margin-top: 1rem;">
                        <div class="form-group mb-large">
                            <label for="adminOtp">Enter 6-Digit OTP</label>
                            <input type="text" id="adminOtp" placeholder="••••••" maxlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary" id="loginBtn" style="margin-top: 1rem;">
                            Verify & Login
                        </button>
                    </div>

                    <div style="margin-top: 1.5rem; text-align: center;">
                        <a href="hr-request.html" style="color: var(--muted); text-decoration: none; font-size: 0.9rem;">&larr; Back to HR Request Portal</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" class="toast hidden">
        <div class="toast-icon">i</div>
        <div class="toast-content">
            <div class="toast-title" id="toastTitle">Notification</div>
            <div class="toast-msg" id="toastMessage">Something happened.</div>
        </div>
    </div>

    <script src="hr-app.js"></script>
</body>
</html>
